<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>XYZ University — Student Portal</title>
</head>
<body>

    <div class="page-wrapper">
        <div class="card">

            <span class="badge">XYZ University Portal</span>
            <h1>Welcome, Student!</h1>
            <p class="subtitle">Create your account to access notes, lectures, and study materials.</p>

            <div class="features">
                <div class="feature-pill"><div class="feature-dot"></div>Lecture Notes</div>
                <div class="feature-pill"><div class="feature-dot"></div>Video Lectures</div>
                <div class="feature-pill"><div class="feature-dot"></div>Study Resources</div>
            </div>

            <form action="/addUser" method="POST" target="_blank" id="signupForm">

                <div class="field-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉</span>
                        <input type="text" id="email" placeholder="jane@email.com" name="email">
                    </div>
                </div>

                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">◉</span>
                        <input type="text" id="username" placeholder="Jane Doe" name="username">
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Create a strong password" name="password">
                    </div>
                </div>

                <button id="formBtn" type="submit">Create Account</button>

            </form>

            <div class="divider">or</div>
            <p class="login-link">Already have an account? <span>Sign in</span></p>

        </div>
    </div>

</body>
</html>
