<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>XYZ University — Student Portal</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="success-banner" id="successBanner">
    Account created successfully! Welcome to XYZ University.
    </div>
        <div class="card">

            <span class="badge">XYZ University Portal</span>
            <h1>Welcome, Student!</h1>
            <p class="subtitle">Create your account to access notes, lectures, and study materials.</p>

            <div class="features">
                <div class="feature-pill"><div class="feature-dot"></div>Lecture Notes</div>
                <div class="feature-pill"><div class="feature-dot"></div>Video Lectures</div>
                <div class="feature-pill"><div class="feature-dot"></div>Study Resources</div>
            </div>

            <form action="/addUser" method="POST" id="signupForm">

                <div class="field-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉</span>
                        <input type="text" id="email" placeholder="jane@email.com" name="email">
                    </div>
                </div>

                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">◉</span>
                        <input type="text" id="username" placeholder="Jane Doe" name="username">
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Create a strong password" name="password">
                    </div>
                </div>

                <button id="formBtn" type="submit">Create Account</button>

            </form>

            <div class="divider">or</div>
            <p class="login-link">Already have an account? <span>Sign in</span></p>

        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('success') === 'true') {
                const banner = document.getElementById('successBanner');
                banner.style.display = 'block';
                banner.style.opacity = '1';
                setTimeout(() => {
                    banner.style.opacity = '0';
                    setTimeout(() => {
                        banner.style.display = 'none';
                    }, 250);
                }, 3600);
            }
        });
    </script>
</body>
</html>
